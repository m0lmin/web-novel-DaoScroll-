<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - DaoScrolls</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg border-bottom p-3" style="background-color: var(--navbar-bg);">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.html">📜 DaoScrolls</a>
        <div class="ms-auto">
            <a href="index.html" class="btn btn-outline-secondary btn-sm">На головну</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <h3 class="mb-4 border-bottom pb-2">Каталог сувоїв</h3>

    <div class="row mb-4">
        <div class="col-md-6 mb-2">
            <input type="text" id="searchInput" class="form-control" placeholder="Пошук за назвою...">
        </div>
        <div class="col-md-4 mb-2">
            <select id="genreFilter" class="form-select">
                <option value="All">Всі жанри</option>
                <option value="Xianxia">Xianxia</option>
                <option value="Wuxia">Wuxia</option>
                <option value="LitRPG">LitRPG</option>
                <option value="Xuanhuan">Xuanhuan</option>
            </select>
        </div>
    </div>

    <div class="row g-4" id="novelGrid">
        <div class="col-12 text-center text-muted">Завантаження бази даних...</div>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    // Ось тут JS код надійно захований у тегах <script>, тому він виконається, а не вилізе на екран!
    const API_URL = "http://localhost:8081/api/novels";
    const searchInput = document.getElementById('searchInput');
    const genreFilter = document.getElementById('genreFilter');
    const novelGrid = document.getElementById('novelGrid');

    let allNovelsCache = [];

    window.onload = async () => {
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Помилка сервера');
            allNovelsCache = await response.json();
            applyFilters();
        } catch (error) {
            novelGrid.innerHTML = `<div class="col-12 text-center text-danger">Не вдалося завантажити новели.</div>`;
        }
    };

    searchInput.addEventListener('input', applyFilters);
    genreFilter.addEventListener('change', applyFilters);

    function applyFilters() {
        const query = searchInput.value.trim().toLowerCase();
        const selectedGenre = genreFilter.value;

        const filtered = allNovelsCache.filter(n => {
            const matchGenre = selectedGenre === 'All' || n.genre === selectedGenre;
            const matchTitle = n.title.toLowerCase().includes(query);
            return matchGenre && matchTitle;
        });
        renderNovels(filtered);
    }

    function renderNovels(novels) {
        novelGrid.innerHTML = '';

        if (novels.length === 0) {
            novelGrid.innerHTML = `<div class="col-12 text-center mt-4">Нічого не знайдено.</div>`;
            return;
        }

        novels.forEach(novel => {
            const img = novel.coverUrl || `https://picsum.photos/seed/dao${novel.id}/300/400`;
            const card = `
                    <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
                        <div class="simple-card h-100">
                            <img src="${img}" class="card-img-top" alt="Cover">
                            <div class="card-body d-flex flex-column">
                                <span class="badge bg-primary mb-2" style="width: fit-content;">${novel.genre}</span>
                                <h6 class="fw-bold">${novel.title}</h6>
                                <div class="mt-auto pt-3">
                                    <a href="novel.html?id=${novel.id}" class="btn btn-outline-primary btn-sm w-100">Перейти</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            novelGrid.insertAdjacentHTML('beforeend', card);
        });
    }
</script>
</body>
</html>
