<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редагувати новелу - DaoScrolls</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg border-bottom p-3" style="background-color: var(--navbar-bg);">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="index.html">📜 DaoScrolls</a>
    <a href="author-panel.html" class="btn btn-outline-secondary btn-sm">Назад до панелі</a>
  </div>
</nav>

<div class="container mt-5 mb-5">
  <div class="card simple-card p-4 mx-auto" style="max-width: 600px;">
    <h4 class="mb-4 border-bottom pb-2">Редагування книги</h4>

    <form onsubmit="alert('Зміни збережено!'); window.location.href='author-panel.html'; return false;">
      <div class="mb-3">
        <label class="form-label fw-bold">Назва новели</label>
        <input type="text" class="form-control" value="Шлях Безсмертного" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Жанр</label>
        <select class="form-select" required>
          <option value="Xianxia" selected>Xianxia</option>
          <option value="Wuxia">Wuxia</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Опис</label>
        <textarea class="form-control" rows="5" required>Старий текст опису...</textarea>
      </div>
      <button type="submit" class="btn btn-success w-100">Оновити</button>
    </form>
  </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
