<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Профіль - DaoScrolls</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg border-bottom p-3" style="background-color: var(--navbar-bg);">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.html">📜 DaoScrolls</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="catalog.html">Каталог</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Форум</a></li>
            </ul>
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-secondary btn-sm me-3" onclick="toggleTheme()" title="Змінити тему">
                    <i class="bi bi-moon-fill"></i>
                </button>
                <button class="btn btn-danger btn-sm" onclick="logout()">Вийти з акаунту</button>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4 simple-card mx-auto" style="max-width: 600px;">
        <h4 class="fw-bold" id="userName">Користувач</h4>
        <p class="text-muted" id="userEmail">email@example.com</p>
        <hr>

        <h6 class="fw-bold">Статус культивації: <span class="text-primary" id="rankName">Загартування Тіла</span></h6>
        <p class="small">Рівень: <span id="userLevel">1</span> з 15</p>

        <div class="progress mb-3" style="height: 20px;">
            <div id="expBar" class="progress-bar bg-success" role="progressbar" style="width: 10%;">10 / 100 Ци</div>
        </div>
        <p class="small text-muted text-center mb-4">Читай розділи новел, щоб накопичувати Духовну Енергію.</p>

        <div class="row g-2">
            <div class="col-6">
                <a href="library.html" class="btn btn-primary w-100">Моя Бібліотека</a>
            </div>
            <div class="col-6">
                <a href="author-panel.html" class="btn btn-secondary w-100">Панель Автора</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
